<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>電験三種 理論 公式暗記</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">電験三種・理論</p>
        <h1>公式暗記カード</h1>
      </div>
      <div class="streak" aria-label="完全に覚えた枚数">
        <span id="masteredCount">0</span>
        <small>完了</small>
      </div>
    </header>

    <main>
      <section class="controls" aria-label="公式検索と絞り込み">
        <label class="search">
          <span>検索</span>
          <input id="searchInput" type="search" placeholder="例: 電力、クーロン、リアクタンス">
        </label>
        <div id="categoryTabs" class="tabs" role="tablist" aria-label="分野"></div>
      </section>

      <section class="mode-switch" aria-label="学習モード">
        <button class="mode-button active" type="button" data-mode="cards">カード</button>
        <button class="mode-button" type="button" data-mode="quiz">確認</button>
        <button class="mode-button" type="button" data-mode="memorize">暗記</button>
        <button class="mode-button" type="button" data-mode="list">一覧</button>
      </section>

      <section id="cardsView" class="cards" aria-live="polite"></section>

      <section id="quizView" class="quiz hidden" aria-live="polite">
        <div class="quiz-panel">
          <p class="quiz-kicker" id="quizCategory">公式チェック</p>
          <h2 id="quizTitle"></h2>
          <div class="quiz-answer hidden" id="quizAnswer"></div>
          <div class="quiz-actions three">
            <button id="prevQuestion" type="button">ひとつ前</button>
            <button id="showAnswer" type="button">答えを見る</button>
            <button id="nextQuestion" type="button">次へ</button>
          </div>
        </div>
      </section>

      <section id="memorizeView" class="memorize hidden" aria-live="polite"></section>

      <section id="listView" class="formula-list hidden" aria-live="polite"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
